<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0c1222"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5B041"/>
      <stop offset="100%" style="stop-color:#F7DC6F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Chart line -->
  <polyline points="80,340 160,280 230,310 300,220 370,240 432,160"
    fill="none" stroke="url(#gold)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="160" cy="280" r="14" fill="#F5B041"/>
  <circle cx="300" cy="220" r="14" fill="#F7DC6F"/>
  <circle cx="432" cy="160" r="16" fill="#F5B041"/>
  <!-- Bottom text bar -->
  <rect x="60" y="370" width="392" height="6" rx="3" fill="#F5B041" opacity="0.3"/>
</svg>
